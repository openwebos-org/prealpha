<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OpenWebOS Recovery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--orange:#FF6A00;--dark:#1a1a1a;--darker:#111;--card:#222;--border:#333;--text:#e0e0e0;--muted:#888;--red:#e53935;--green:#43a047;--blue:#1e88e5;--yellow:#f9a825}
html,body{width:100%;height:100%;overflow:hidden;background:var(--darker);font-family:'Roboto Mono',monospace,'Courier New',monospace;color:var(--text)}
#screen{width:100%;height:100vh;display:flex;flex-direction:column}

/* Status bar */
#statusbar{background:#000;padding:4px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid #333}
.sb-left{font-size:10px;color:var(--orange);letter-spacing:1px;font-weight:700}
.sb-right{font-size:10px;color:var(--muted);display:flex;gap:12px}

/* Header */
#header{background:linear-gradient(180deg,#2a2a2a,#1a1a1a);border-bottom:2px solid var(--orange);padding:10px 14px;flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-size:18px;font-weight:700;color:var(--orange);letter-spacing:2px;text-transform:uppercase}
.hdr-ver{font-size:10px;color:var(--muted);letter-spacing:1px}
.hdr-device{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:.5px}
.hdr-status{font-size:10px;color:var(--green);letter-spacing:1px;text-align:right}

/* Main layout */
#main{flex:1;display:flex;overflow:hidden}

/* Side nav */
#sidenav{width:100px;background:#111;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.nav-btn{padding:14px 6px;text-align:center;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-bottom:1px solid var(--border);color:var(--muted);transition:.15s;line-height:1.5;user-select:none}
.nav-btn:hover{background:rgba(255,106,0,0.1);color:var(--orange)}
.nav-btn.active{background:rgba(255,106,0,0.18);color:var(--orange);border-left:3px solid var(--orange)}
.nav-icon{font-size:18px;display:block;margin-bottom:4px}

/* Content area */
